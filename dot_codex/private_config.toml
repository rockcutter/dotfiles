[tui.model_availability_nux]
"gpt-5.5" = 4

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "$HOME/.codex/hooks/stop.sh"
timeout = 30
statusMessage = "Notifying"
