[projects."/Users/rockcutter/ghq/github.com/voyagegroup/fluct_report_batch"]
trust_level = "trusted"

[projects."/Users/rockcutter"]
trust_level = "trusted"

[projects."/Users/rockcutter/ghq/github.com/voyagegroup/fluct_funnel"]
trust_level = "trusted"

[projects."/Users/rockcutter/ghq/github.com/voyagegroup/fluct_ms"]
